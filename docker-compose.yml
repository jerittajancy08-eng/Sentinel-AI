# ─────────────────────────────────────────────
# Sentinel AI — Local full-stack orchestration
#
# Usage:
#   docker compose up --build
#
# Backend:  http://localhost:8000  (docs at /docs)
# Frontend: http://localhost:3000
# ─────────────────────────────────────────────

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-ai-backend
    ports:
      - "8000:8000"
    environment:
      # Set to "false" and provide real keys below to use live Foundry/OpenAI
      SENTINEL_MOCK_MODE: "true"
      AZURE_OPENAI_ENDPOINT: "${AZURE_OPENAI_ENDPOINT:-}"
      AZURE_OPENAI_KEY: "${AZURE_OPENAI_KEY:-}"
      AZURE_OPENAI_DEPLOYMENT: "${AZURE_OPENAI_DEPLOYMENT:-gpt-4o}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      FOUNDRY_PROJECT_ENDPOINT: "${FOUNDRY_PROJECT_ENDPOINT:-}"
      FOUNDRY_MODEL_DEPLOYMENT: "${FOUNDRY_MODEL_DEPLOYMENT:-gpt-4o}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8000"
    container_name: sentinel-ai-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
